<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoBrasil - Enciclopédia de Carros</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e74c3c;
            --light: #ecf0f1;
            --dark: #1a1a1a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            color: var(--dark);
        }

        header {
            background-color: var(--primary);
            color: white;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .container {
            max-width: 900px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        input {
            flex: 1;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--accent);
        }

        .car-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            display: none; /* Escondido por padrão */
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .car-header {
            background: var(--primary);
            color: white;
            padding: 20px;
        }

        .car-info {
            padding: 20px;
        }

        .specs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
        }

        .spec-item b {
            display: block;
            color: var(--accent);
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .versions-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .versions-table th, .versions-table td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        .versions-table th {
            background-color: #eee;
        }

        .no-results {
            text-align: center;
            color: #666;
            margin-top: 50px;
        }

        .tag {
            background: var(--accent);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-left: 10px;
        }
    </style>
</head>
<body>

<header>
    <h1>🚗 Pesquisa de Carros Brasileiros</h1>
    <p>Modelos produzidos de 1980 a 2025</p>
</header>

<div class="container">
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Digite o nome do carro (ex: Gol, Opala, Onix)..." onkeyup="searchCar()">
    </div>

    <div id="resultsArea">
        <div class="no-results">Digite o nome de um veículo para ver as especificações.</div>
    </div>
</div>

<script>
    // Base de Dados de Exemplo (Expansível)
    const carros = [
        {
            nome: "Volkswagen Gol",
            periodo: "1980 - 2023",
            descricao: "O carro mais vendido da história do Brasil, ícone de robustez e confiabilidade.",
            especificacoes: {
                origem: "Brasil",
                carroceria: "Hatchback",
                motores: "1.0, 1.3 (Ar), 1.6, 1.8, 2.0 (GTI)"
            },
            versoes: [
                { nome: "BX / L", nivel: "Básico", motor: "1.3 Ar / 1.6 Ar" },
                { nome: "CL / GL", nivel: "Intermediário", motor: "1.6 / 1.8 AP" },
                { nome: "GTI", nivel: "Luxo / Esportivo", motor: "2.0 Injeção" }
            ]
        },
        {
            nome: "Chevrolet Opala",
            periodo: "1968 - 1992",
            descricao: "Clássico absoluto do mercado brasileiro, conhecido pelo conforto e potência dos motores 6 cilindros.",
            especificacoes: {
                origem: "Brasil (Tecnologia Opel)",
                carroceria: "Sedã / Cupê",
                motores: "2.5 (151) e 4.1 (250)"
            },
            versoes: [
                { nome: "Especial", nivel: "Básico", motor: "4 cil" },
                { nome: "Comodoro", nivel: "Intermediário/Luxo", motor: "4 ou 6 cil" },
                { nome: "Diplomata SE", nivel: "Luxo Máximo", motor: "6 cil 4.1" }
            ]
        },
        {
            nome: "Fiat Uno",
            periodo: "1984 - 2021",
            descricao: "Revolucionou o mercado com o conceito 'pequeno por fora, grande por dentro'.",
            especificacoes: {
                origem: "Brasil / Itália",
                carroceria: "Hatchback",
                motores: "1.0 (Mille), 1.3, 1.5, 1.4 Turbo"
            },
            versoes: [
                { nome: "Mille", nivel: "Popular / Entrada", motor: "1.0" },
                { nome: "CS / 1.5R", nivel: "Intermediário", motor: "1.5" },
                { nome: "Turbo i.e.", nivel: "Luxo / Performance", motor: "1.4 Turbo" }
            ]
        },
        {
            nome: "Chevrolet Onix",
            periodo: "2012 - 2025",
            descricao: "Líder de vendas da era moderna, focado em conectividade e segurança.",
            especificacoes: {
                origem: "Brasil",
                carroceria: "Hatchback",
                motores: "1.0, 1.4, 1.0 Turbo"
            },
            versoes: [
                { nome: "Joy", nivel: "Básico", motor: "1.0" },
                { nome: "LTZ", nivel: "Intermediário", motor: "1.0 Turbo" },
                { nome: "Premier", nivel: "Luxo / Topo", motor: "1.0 Turbo" }
            ]
        }
    ];

    function searchCar() {
        const input = document.getElementById('searchInput').value.toLowerCase();
        const resultsArea = document.getElementById('resultsArea');
        
        if (input.length < 2) {
            resultsArea.innerHTML = '<div class="no-results">Digite pelo menos 2 letras...</div>';
            return;
        }

        const filtro = carros.filter(c => c.nome.toLowerCase().includes(input));

        if (filtro.length > 0) {
            resultsArea.innerHTML = '';
            filtro.forEach(carro => {
                const card = document.createElement('div');
                card.className = 'car-card';
                card.style.display = 'block';

                let versoesHTML = '';
                carro.versoes.forEach(v => {
                    versoesHTML += `
                        <tr>
                            <td>${v.nome}</td>
                            <td>${v.motor}</td>
                            <td><span class="tag">${v.nivel}</span></td>
                        </tr>
                    `;
                });

                card.innerHTML = `
                    <div class="car-header">
                        <h2>${carro.nome} <small>(${carro.periodo})</small></h2>
                    </div>
                    <div class="car-info">
                        <p>${carro.descricao}</p>
                        
                        <div class="specs-grid">
                            <div class="spec-item"><b>Origem</b>${carro.especificacoes.origem}</div>
                            <div class="spec-item"><b>Carroceria</b>${carro.especificacoes.carroceria}</div>
                            <div class="spec-item"><b>Motores principais</b>${carro.especificacoes.motores}</div>
                        </div>

                        <h3>Versões e Acabamentos</h3>
                        <table class="versions-table">
                            <thead>
                                <tr>
                                    <th>Versão</th>
                                    <th>Motorização</th>
                                    <th>Categoria</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${versoesHTML}
                            </tbody>
                        </table>
                    </div>
                `;
                resultsArea.appendChild(card);
            });
        } else {
            resultsArea.innerHTML = '<div class="no-results">Nenhum veículo encontrado com esse nome.</div>';
        }
    }
</script>

</body>
</html>
